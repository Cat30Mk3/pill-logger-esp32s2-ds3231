[platformio]
default_envs = lolin_esp32s2_mini

[env:lolin_esp32s2_mini]
;platform = espressif32@6.5.0
platform = espressif32@6.3.2
board = lolin_s2_mini
framework = arduino

upload_speed = 921600
;upload_port = COM15
upload_flags =
    --after
    no_reset
monitor_speed = 115200
;monitor_port = COM15
monitor_dtr = 1
monitor_rts = 1
monitor_filters = skip_opening

build_flags =
    -DBUILD_UNIX_TIME=$UNIX_TIME  ;supposed to procide compile date and time to the code, but it does not work. It always provides the same value, which is the time of the first compilation. I have no idea why.
    -DSERIAL_DEBUG_ENABLE=1        ; production default: compile out all DBG_* serial output
    -I include
    -D VERSION_NAME=\"DS3231-V2\"  ;DS3231 Enhancement Version 2
    

;a comment

board_build.usb_cdc_on_boot = 0
board_build.usb_mode = SERIAL_ONLY
upload_protocol = esptool

lib_ldf_mode = deep+

lib_deps =
    olikraus/U8g2 @ ^2.36.17
    wire
    SPI
    adafruit/RTClib @ ^2.1.4

build_src_filter = 
    +<main.cpp>
